name: Build SefaAi Booster APK Ultimate
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Java Setup
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer kivy

    - name: Build APK and Force License Accept
      run: |
        # 1. Adım: Buildozer'ı başlatıyoruz ki gerekli SDK klasörlerini kendi orijinal haliyle indirsin.
        # İlk aşamada lisans hatası verip durana kadar arka planda çalıştıracağız.
        buildozer android debug || true
        
        # 2. Adım: Buildozer'ın az önce indirdiği orijinal sdkmanager'ı bulup TÜM lisansları zorla onaylatıyoruz.
        if [ -f /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ]; then
          yes | /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        elif [ -f /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager ]; then
          yes | /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses
        fi
        
        # 3. Adım: Lisanslar artık tamamen onaylandığı için derlemeyi asıl şimdi başarıyla tamamlaması için tetikliyoruz.
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload Compiled APK (Deep Search)
      uses: actions/upload-artifact@v4
      with:
        name: sefaai-gamebooster-ultimate
        path: |
          ./bin/*.apk
          ./**/.buildozer/android/platform/build/dists/*/*.apk
          ./**/*.apk
          
