name: Build SefaAi Booster APK Clean Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Java Setup
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer kivy

    - name: Run Buildozer to Download SDK
      run: |
        # 1. ADIM: Buildozer'ı sadece klasörleri ve sdkmanager'ı indirsin diye başlatıyoruz.
        # Aidl hatası verip ilk seferde çökmesi çok normal, durdurmuyoruz (|| true dedik).
        buildozer android debug || true

    - name: Force Fix Android Licenses and Build Tools
      run: |
        # 2. ADIM: Buildozer'ın indirdiği sdkmanager'ın yolunu tam olarak buluyoruz.
        export SDK_BIN="/home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin"
        if [ ! -d "$SDK_BIN" ]; then
          export SDK_BIN="/home/runner/.buildozer/android/platform/android-sdk/tools/bin"
        fi
        
        # 3. ADIM: Buildozer'ın takıldığı o Build-Tools 33 ve 37 lisanslarını zorla onaylayıp kuruyoruz!
        yes | $SDK_BIN/sdkmanager --licenses
        $SDK_BIN/sdkmanager "build-tools;33.0.1" "platform-tools" "platforms;android-33"
        yes | $SDK_BIN/sdkmanager --licenses

    - name: Final Buildozer Run
      run: |
        # 4. ADIM: Artık Aidl ve lisans eksikleri tamamen kapandığı için derlemeyi başarıyla bitiriyoruz.
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload Compiled APK (Deep Search)
      uses: actions/upload-artifact@v4
      with:
        name: sefaai-gamebooster-fixed
        path: |
          ./bin/*.apk
          ./**/.buildozer/android/platform/build/dists/*/*.apk
          ./**/*.apk
          
