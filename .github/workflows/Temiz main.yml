name: Build SefaAi Booster APK Ultimate
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Java Setup
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Pre-create Buildozer SDK Directories and Force Licenses
      run: |
        # Buildozer'ın gizli SDK klasör mimarisini önceden zorla oluşturuyoruz
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
        
        # Resmi cmdline-tools paketini indirip Buildozer'ın klasörüne açıyoruz
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools/* /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
        
        # Buildozer'ın aradığı eski sdkmanager yoluna köprü (link) kuruyoruz
        ln -sf /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        
        # İŞTE KRİTİK NOKTA: Buildozer'ın kendi klasöründeki tüm Google lisanslarını peşinen onaylıyoruz
        yes | /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer kivy

    - name: Run Buildozer Android Debug
      run: |
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        
