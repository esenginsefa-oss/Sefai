name: Build SefaAi Booster APK Clean Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Java Setup
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev

    - name: Install Android SDK Manually
      run: |
        # Temiz ve bağımsız bir SDK klasörü kuruyoruz
        mkdir -p /home/runner/android-sdk/cmdline-tools
        cd /home/runner/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools latest
        
        # Yolları tanımlıyoruz ve gerekli paketleri kuruyoruz
        export ANDROID_HOME=/home/runner/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        # Build-tools 33 ve gerekli platformu önden yüklüyoruz
        yes | ./latest/bin/sdkmanager --licenses
        ./latest/bin/sdkmanager "platform-tools" "build-tools;33.0.1" "platforms;android-33" "ndk;25.2.9519653"
        yes | ./latest/bin/sdkmanager --licenses

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer kivy

    - name: Run Buildozer Android Debug
      run: |
        # Buildozer'ın kendi SDK'sını kurmasını engellemek için yolları buraya mühürlüyoruz
        mkdir -p /home/runner/.buildozer/android/platform
        ln -s /home/runner/android-sdk /home/runner/.buildozer/android/platform/android-sdk
        ln -s /home/runner/android-sdk/ndk/25.2.9519653 /home/runner/.buildozer/android/platform/android-ndk-r25b
        
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        ANDROID_HOME: /home/runner/android-sdk
        ANDROID_SDK_ROOT: /home/runner/android-sdk

    - name: Upload Compiled APK (Deep Search)
      uses: actions/upload-artifact@v4
      with:
        name: sefaai-gamebooster-fixed
        path: |
          ./bin/*.apk
          ./**/.buildozer/android/platform/build/dists/*/*.apk
          ./**/*.apk
          
