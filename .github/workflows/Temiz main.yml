name: Build SefaAi Booster APK Clean Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Java Setup
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & NDK Officially
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: false

    - name: Install Correct Android Components
      run: |
        # Doğru build-tools ve platform paketlerini kuruyoruz
        sdkmanager --install "platform-tools" "build-tools;33.0.1" "platforms;android-33" "ndk;25.2.9519653"
        # Tüm lisans sözleşmelerini sisteme peşinen onaylatıyoruz
        yes | sdkmanager --licenses

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer kivy

    - name: Run Buildozer with Pre-installed SDK
      run: |
        # Buildozer kendi klasörünü açmasın diye sunucudaki resmi SDK yollarını bağlıyoruz
        mkdir -p /home/runner/.buildozer/android/platform
        ln -s /usr/local/lib/android/sdk /home/runner/.buildozer/android/platform/android-sdk
        
        # Buildozer'ı çalıştırıyoruz
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    - name: Upload Compiled APK (Deep Search)
      uses: actions/upload-artifact@v4
      with:
        name: sefaai-gamebooster-fixed
        path: |
          ./bin/*.apk
          ./**/.buildozer/android/platform/build/dists/*/*.apk
          ./**/*.apk
          
